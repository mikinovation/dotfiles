name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: leafo/gh-actions-lua@6919171ccf181b826f44b9bca76307b577217377 # v13
        with:
          luaVersion: "5.1.5"

      - uses: leafo/gh-actions-luarocks@35d062def313a7699a0d513e996bcf4352f05389 # v6
        with:
          luarocksVersion: "3.12.0"

      - name: build
        run: |
          luarocks install luacheck
          luarocks install busted

      - name: Run Luacheck
        run: luacheck .

      - name: Install StyLua
        uses: JohnnyMorganz/stylua-action@76fd70c03e6340ceaf673366712db9b20560b402 # v5.0.0
        with:
          version: v2.1.0
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --check .

      - name: Run Busted Tests
        run: busted .

  nix-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: cachix/install-nix-action@ab739621df7a23f52766f9ccc97f38da6b7af14f # v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Run Nix format check
        run: sh ./scripts/nix-fmt.sh

      - name: Run Nix tests
        run: sh ./scripts/nix-test.sh

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: npm ci

      - name: Run Secretlint
        run: |
          if ! git ls-files -z | xargs -0 ./node_modules/.bin/secretlint; then
            echo "Secret lint failed! Sensitive data may have been committed."
            exit 1
          fi

  nvim-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Neovim
        uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7 # v1.6.1
        with:
          neovim: true
          version: v0.11.6

      - name: Install luarocks and build dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y luarocks lua5.1 liblua5.1-0-dev
          sudo luarocks install luarocks-build-treesitter-parser
          npm install -g tree-sitter-cli

      - name: Cache Neovim plugins
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.local/share/nvim/lazy
            ~/.local/share/nvim/lazy-rocks
          key: nvim-plugins-${{ hashFiles('nix/programs/neovim/nvim/plugins.lua', 'nix/programs/neovim/nvim/plugins/*.lua') }}
          restore-keys: |
            nvim-plugins-

      - name: Run Neovim smoke test
        run: sh ./scripts/nvim-smoke-test.sh
        timeout-minutes: 5
